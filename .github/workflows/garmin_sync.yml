name: Garmin Activity Sync

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Trigger source (webhook/manual)'
        required: false
        default: 'manual'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect psycopg2-binary python-dotenv

      - name: Run Daily Activity Sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          TRIGGERED_BY: ${{ inputs.triggered_by || 'manual' }}
        run: python data/garmin_sync_daily.py